name: Mark Latest Release

on:
  push:
    branches:
      - main
    paths:
      - .github/latest-release-tag
      - .github/workflows/mark-latest-release.yml
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to mark as latest
        required: true
        default: v1.4.0

permissions:
  contents: write

jobs:
  mark:
    name: Mark latest release
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout latest marker
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="$(tr -d '[:space:]' < .github/latest-release-tag)"
          fi

          if [ -z "$tag" ]; then
            echo "Release tag is empty" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Mark release as latest
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
        run: gh release edit "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --latest
