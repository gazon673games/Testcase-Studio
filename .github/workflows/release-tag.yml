name: Release From Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-tag-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            artifact: release-windows-x64
            builder_args: --win nsis portable --x64 --publish never
          - label: windows-arm64
            os: windows-11-arm
            artifact: release-windows-arm64
            builder_args: --win nsis portable --arm64 --publish never
          - label: macos-intel
            os: macos-15-intel
            artifact: release-macos-x64
            builder_args: --mac dmg zip --x64 --publish never
          - label: macos-arm64
            os: macos-latest
            artifact: release-macos-arm64
            builder_args: --mac dmg zip --arm64 --publish never
          - label: linux-x64
            os: ubuntu-latest
            artifact: release-linux-x64
            builder_args: --linux AppImage tar.gz --x64 --publish never
          - label: linux-arm64
            os: ubuntu-24.04-arm
            artifact: release-linux-arm64
            builder_args: --linux AppImage tar.gz --arm64 --publish never

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install native Electron dependencies
        run: npm run pack:deps

      - name: Build app
        run: npm run build

      - name: Package release artifacts
        run: npx electron-builder --config electron-builder.config.cjs ${{ matrix.builder_args }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.tar.gz

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        shell: pwsh
        run: |
          $tag = $env:TAG_NAME
          $title = "Testcase Studio $tag"
          $notes = @(
            "Testcase Studio $tag",
            "",
            "Desktop build release with packaged artifacts for:",
            "- Windows installer and portable builds",
            "- macOS dmg and zip builds",
            "- Linux AppImage and tar.gz builds",
            "",
            "The release workflow uploads the compiled assets for x64 and arm64 where the target platform supports them."
          ) -join "`n"

          gh release view $tag --repo $env:GH_REPO 1>$null 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --repo $env:GH_REPO --title $title --notes $notes
          }

          Get-ChildItem -Path release-artifacts -Recurse -File | ForEach-Object {
            gh release upload $tag "$($_.FullName)" --repo $env:GH_REPO --clobber
          }
