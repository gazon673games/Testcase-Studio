name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            artifact: release-windows-x64
            builder_args: --win nsis portable --x64 --publish never
          - label: windows-arm64
            os: windows-11-arm
            artifact: release-windows-arm64
            builder_args: --win nsis portable --arm64 --publish never
          - label: macos-intel
            os: macos-15-intel
            artifact: release-macos-x64
            builder_args: --mac dmg zip --x64 --publish never
          - label: macos-arm64
            os: macos-latest
            artifact: release-macos-arm64
            builder_args: --mac dmg zip --arm64 --publish never
          - label: linux-x64
            os: ubuntu-latest
            artifact: release-linux-x64
            builder_args: --linux AppImage tar.gz --x64 --publish never
          - label: linux-arm64
            os: ubuntu-24.04-arm
            artifact: release-linux-arm64
            builder_args: --linux AppImage tar.gz --arm64 --publish never

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install native Electron dependencies
        run: npm run pack:deps

      - name: Build app
        run: npm run build

      - name: Package release artifacts
        run: npx electron-builder --config electron-builder.config.mjs ${{ matrix.builder_args }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.tar.gz
            release/*.blockmap
            release/*.yml

  publish:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs:
      - release-please
      - build
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    timeout-minutes: 20

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Upload assets to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          Get-ChildItem -Path release-artifacts -Recurse -File | ForEach-Object {
            gh release upload "${{ needs.release-please.outputs.tag_name }}" "$($_.FullName)" --repo $env:GH_REPO --clobber
          }
        shell: pwsh
